<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>India Metro & Mega Cities Explorer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f5;--bg-tertiary:#efefef;
  --text-primary:#111111;--text-secondary:#666666;--text-tertiary:#999999;
  --border-main:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.2);
  --radius-md:8px;--radius-lg:12px;--radius-xl:16px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1a1a1a;--bg-secondary:#242424;--bg-tertiary:#2e2e2e;
    --text-primary:#f0f0f0;--text-secondary:#aaaaaa;--text-tertiary:#777777;
    --border-main:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.2);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f0f0;color:var(--text-primary);padding:24px;min-height:100vh}
@media(prefers-color-scheme:dark){body{background:#141414}}

.iu-hero{background:linear-gradient(135deg,#0B1929 0%,#122436 60%,#0F2238 100%);padding:1.75rem 1.5rem 1.25rem;position:relative;overflow:hidden;border-radius:var(--radius-lg);margin-bottom:1rem}
.iu-hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(245,166,35,0.04) 40px,rgba(245,166,35,0.04) 41px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(245,166,35,0.04) 40px,rgba(245,166,35,0.04) 41px);pointer-events:none}
.iu-hero-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:5px;position:relative}
.iu-hero-title span{color:#F5A623}
.iu-hero-sub{font-size:12px;color:#8DA3B8;position:relative;margin-bottom:1rem}
.iu-stats-row{display:flex;gap:10px;flex-wrap:wrap;position:relative}
.iu-stat{background:rgba(255,255,255,0.06);border:0.5px solid rgba(245,166,35,0.2);border-radius:var(--radius-md);padding:8px 14px}
.iu-stat-num{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:#F5A623;line-height:1}
.iu-stat-lbl{font-size:10px;color:#8DA3B8;margin-top:2px}

.iu-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:1rem 0 0.6rem}
.iu-search-wrap{position:relative;flex:1;min-width:160px}
.iu-search{width:100%;background:var(--bg-primary);border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:8px 10px 8px 32px;font-size:13px;color:var(--text-primary);outline:none;font-family:'Inter',sans-serif}
.iu-search:focus{border-color:#F5A623}
.iu-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text-secondary);pointer-events:none}
.iu-filter-btn{background:var(--bg-primary);border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;font-weight:500}
.iu-filter-btn.active{border-color:#F5A623;color:#F5A623;background:rgba(245,166,35,0.08)}
.iu-sort-select{background:var(--bg-primary);border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:8px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;outline:none;font-family:'Inter',sans-serif}
.iu-count-note{font-size:11px;color:var(--text-secondary);margin-bottom:12px}

.iu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.iu-card{background:var(--bg-primary);border:0.5px solid var(--border-main);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.2s,transform 0.2s}
.iu-card:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.iu-card-accent{height:4px;width:100%}
.iu-card-body{padding:14px 16px}
.iu-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.iu-city-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text-primary);line-height:1.2}
.iu-city-region{font-size:11px;color:var(--text-secondary);margin-top:3px;font-family:'Inter',sans-serif;font-weight:400}
.iu-pop-badge{background:rgba(245,166,35,0.12);color:#8A5800;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;border:0.5px solid rgba(245,166,35,0.4);font-family:'Space Grotesk',sans-serif;flex-shrink:0}
.iu-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.iu-metric{background:var(--bg-secondary);border-radius:var(--radius-md);padding:8px 10px}
.iu-metric-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text-primary);line-height:1}
.iu-metric-lbl{font-size:9px;color:var(--text-secondary);margin-top:2px;font-family:'Inter',sans-serif;font-weight:500}
.iu-bars{margin-bottom:10px}
.iu-bar-row{margin-bottom:6px}
.iu-bar-label{display:flex;justify-content:space-between;margin-bottom:3px}
.iu-bar-name{font-size:10px;color:var(--text-secondary);font-family:'Inter',sans-serif}
.iu-bar-pct{font-size:10px;font-weight:700;color:var(--text-primary);font-family:'Space Grotesk',sans-serif}
.iu-bar-track{height:5px;background:var(--bg-secondary);border-radius:4px;overflow:hidden}
.iu-bar-fill{height:100%;border-radius:4px}
.iu-tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}

/* Shared link/tag pill style */
.pill{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:3px;transition:filter 0.15s,transform 0.12s;font-family:'Inter',sans-serif;cursor:pointer}
.pill:hover{filter:brightness(0.85);transform:translateY(-1px)}
.pill i{font-size:10px}
.pill-ext{font-size:8px;opacity:0.6}
/* Transport */
.pill-metro{background:#E6F1FB;color:#0C447C;border:0.5px solid #85B7EB}
.pill-brts{background:#EAF3DE;color:#27500A;border:0.5px solid #97C459}
.pill-rail{background:#FAEEDA;color:#633806;border:0.5px solid #EF9F27}
.pill-water{background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5}
.pill-bus{background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC}
.pill-tram{background:#FBEAF0;color:#72243E;border:0.5px solid #ED93B1}
.pill-ferry{background:#E6F1FB;color:#042C53;border:0.5px solid #85B7EB}
.pill-rrts{background:#FAECE7;color:#712B13;border:0.5px solid #F0997B}
/* Web sources */
.pill-wiki{background:#F1EFE8;color:#2C2C2A;border:0.5px solid #B4B2A9}
.pill-official{background:#FAEEDA;color:#633806;border:0.5px solid #EF9F27}
.pill-gov{background:#EAF3DE;color:#27500A;border:0.5px solid #97C459}
.pill-news{background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC}
.pill-map{background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5}
/* Detail panel larger pills */
.dp-pill{font-size:12px;padding:5px 12px}
.dp-pill i{font-size:12px}

.iu-more-btn{width:100%;background:none;border:none;border-top:0.5px solid var(--border-main);padding:8px 0 0;font-size:12px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:color 0.2s;font-family:'Inter',sans-serif;font-weight:500}
.iu-more-btn:hover{color:#F5A623}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;transition:background 0.35s ease,backdrop-filter 0.35s ease,-webkit-backdrop-filter 0.35s ease;pointer-events:none}
.overlay.open{background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);pointer-events:all}

/* FLOATING PANEL */
.float-panel{background:var(--bg-primary);border-radius:20px;border:0.5px solid var(--border-strong);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;transform:translateY(40px) scale(0.96);opacity:0;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s ease;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.float-panel::-webkit-scrollbar{width:4px}
.float-panel::-webkit-scrollbar-track{background:transparent}
.float-panel::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.overlay.open .float-panel{transform:translateY(0) scale(1);opacity:1}

.fp-accent{height:5px;width:100%;border-radius:20px 20px 0 0}
.fp-body{padding:24px 28px 32px}

.fp-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.fp-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text-secondary);background:var(--bg-secondary);border:0.5px solid var(--border-strong);border-radius:var(--radius-md);padding:7px 14px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.fp-back:hover{color:var(--text-primary);background:var(--bg-primary);border-color:var(--border-strong)}
.fp-close{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--bg-secondary);border:0.5px solid var(--border-strong);border-radius:50%;cursor:pointer;font-size:16px;color:var(--text-secondary);transition:all 0.15s}
.fp-close:hover{color:var(--text-primary);background:var(--bg-primary)}

.fp-city-name{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--text-primary);line-height:1.1;margin-bottom:4px}
.fp-founded{font-size:13px;color:var(--text-secondary);font-family:'Inter',sans-serif;font-weight:400;margin-bottom:14px;display:flex;align-items:center;gap:5px}
.fp-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}
.fp-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:4px}
.fp-badge i{font-size:11px}

.fp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:20px}
.fp-stat{background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px 14px}
.fp-stat-val{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--text-primary);line-height:1}
.fp-stat-lbl{font-size:10px;color:var(--text-secondary);margin-top:3px;font-family:'Inter',sans-serif;font-weight:500}

.fp-util-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.fp-util{background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px 14px}
.fp-util-label{font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.fp-util-label i{font-size:14px}
.fp-util-track{height:6px;background:var(--bg-primary);border-radius:4px;overflow:hidden;margin-bottom:5px;border:0.5px solid var(--border-main)}
.fp-util-fill{height:100%;border-radius:4px}
.fp-util-pct{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text-primary)}
.fp-util-sub{font-size:10px;color:var(--text-secondary);font-family:'Inter',sans-serif;margin-top:1px;font-weight:400}

.fp-sec-label{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:10px;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.fp-sec-label i{font-size:14px}

.fp-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.fp-info-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px 16px}
.fp-info-text{font-size:13px;color:var(--text-primary);line-height:1.65;font-family:'Inter',sans-serif;font-weight:400}

.fp-facts{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:18px}
.fp-fact-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.fp-fact-item:last-child{margin-bottom:0}
.fp-fact-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.fp-fact-text{font-size:13px;color:var(--text-primary);line-height:1.5;font-family:'Inter',sans-serif;font-weight:400}

.fp-future{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:20px}

.fp-divider{height:0.5px;background:var(--border-main);margin:20px 0}

.fp-link-section{margin-bottom:16px}
.fp-link-row{display:flex;gap:7px;flex-wrap:wrap}

.iu-no-results{text-align:center;padding:3rem 1rem;color:var(--text-secondary);font-size:14px}
</style>
</head>
<body>

<div class="iu-hero">
  <div class="iu-hero-title">India's <span>Metro & Mega Cities</span></div>
  <div class="iu-hero-sub">Urban infrastructure explorer · 2025 estimates · Click "More details" on any card to explore</div>
  <div class="iu-stats-row">
    <div class="iu-stat"><div class="iu-stat-num">13</div><div class="iu-stat-lbl">Cities covered</div></div>

    <div class="iu-stat"><div class="iu-stat-num">~100%</div><div class="iu-stat-lbl">Electricity coverage</div></div>
  </div>
</div>

<div class="iu-controls">
  <div class="iu-search-wrap">
    <i class="ti ti-search iu-search-icon" aria-hidden="true"></i>
    <input class="iu-search" id="searchBox" type="text" placeholder="Search cities…" oninput="filterCards()">
  </div>
  <select class="iu-sort-select" id="sortSelect" onchange="filterCards()">
    <option value="pop">Sort: Population</option>
    <option value="area">Sort: Area</option>
    <option value="alpha">Sort: A–Z</option>
    <option value="water">Sort: Water %</option>
  </select>
  <button class="iu-filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="iu-filter-btn" onclick="setFilter('mega',this)">Mega (10M+)</button>
  <button class="iu-filter-btn" onclick="setFilter('metro',this)">Metro (5–10M)</button>
  <button class="iu-filter-btn" onclick="setFilter('large',this)">Large (&lt;5M)</button>
</div>
<div class="iu-count-note" id="countNote"></div>
<div class="iu-grid" id="cityGrid"></div>

<!-- Overlay + modal -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="float-panel" id="floatPanel" onclick="event.stopPropagation()"></div>
</div>

let currentFilter='all';

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.iu-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards(){
  const search=document.getElementById('searchBox').value.toLowerCase();
  const sort=document.getElementById('sortSelect').value;
  let list=CITIES.filter(c=>{
    const ms=c.name.toLowerCase().includes(search)||c.region.toLowerCase().includes(search)||c.tier.toLowerCase().includes(search);
    const mf=currentFilter==='all'||(currentFilter==='mega'&&c.pop>=10)||(currentFilter==='metro'&&c.pop>=5&&c.pop<10)||(currentFilter==='large'&&c.pop<5);
    return ms&&mf;
  });
  list.sort((a,b)=>sort==='pop'?b.pop-a.pop:sort==='area'?b.area-a.area:sort==='alpha'?a.name.localeCompare(b.name):b.water-a.water);
  renderCards(list);
  document.getElementById('countNote').textContent=list.length+' of '+CITIES.length+' cities shown';
}

function renderCards(list){
  const grid=document.getElementById('cityGrid');
  if(!list.length){grid.innerHTML='<div class="iu-no-results"><i class="ti ti-map-off" style="font-size:32px;display:block;margin-bottom:8px"></i>No cities match.</div>';return;}
  grid.innerHTML=list.map(c=>{
    const id=c.name.replace(/[^a-z]/gi,'');
    const tags=c.transport_links.map(t=>`<a class="pill ${t.cls}" href="${t.url}" target="_blank" rel="noopener"><i class="ti ${t.icon}"></i>${t.label}<i class="ti ti-external-link pill-ext"></i></a>`).join('');
    return `<div class="iu-card" id="card-${id}">
  <div class="iu-card-accent" style="background:${c.accentColor}"></div>
  <div class="iu-card-body">
    <div class="iu-card-header">
      <div><div class="iu-city-name">${c.name}</div><div class="iu-city-region">${c.region} · ${c.tier}</div></div>
      <span class="iu-pop-badge">${c.pop}M</span>
    </div>
    <div class="iu-metrics">
      <div class="iu-metric"><div class="iu-metric-val">${c.area.toLocaleString()}</div><div class="iu-metric-lbl">Area km²</div></div>
      <div class="iu-metric"><div class="iu-metric-val">${c.metro_km>0?c.metro_km+' km':'Planned'}</div><div class="iu-metric-lbl">Metro rail</div></div>
      <div class="iu-metric"><div class="iu-metric-val">${c.water}%</div><div class="iu-metric-lbl">Piped water</div></div>
    </div>
    <div class="iu-bars">
      <div class="iu-bar-row"><div class="iu-bar-label"><span class="iu-bar-name"><i class="ti ti-droplet" style="font-size:10px"></i> Water</span><span class="iu-bar-pct">${c.water}%</span></div><div class="iu-bar-track"><div class="iu-bar-fill" style="width:${c.water}%;background:${c.accentColor}"></div></div></div>
      <div class="iu-bar-row"><div class="iu-bar-label"><span class="iu-bar-name"><i class="ti ti-ripple" style="font-size:10px"></i> Sewerage</span><span class="iu-bar-pct">${c.sewerage}%</span></div><div class="iu-bar-track"><div class="iu-bar-fill" style="width:${c.sewerage}%;background:#2ABFBF"></div></div></div>
    </div>
    <div class="iu-tag-row">${tags}</div>
    <button class="iu-more-btn" onclick="openDetail('${id}')"><i class="ti ti-layout-sidebar-right"></i> More details <i class="ti ti-arrow-up-right" style="font-size:10px;opacity:0.55"></i></button>
  </div>
</div>`;
  }).join('');
}

function openDetail(id){
  const c=CITIES.find(x=>x.name.replace(/[^a-z]/gi,'')==id);
  if(!c)return;
  const panel=document.getElementById('floatPanel');
  panel.innerHTML=buildPanel(c);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  panel.scrollTop=0;
}
function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function handleOverlay(e){if(e.target===document.getElementById('overlay'))closeDetail();}

function buildPanel(c){
  const tierStyle=c.tier==='Mega City'?'background:#FAEEDA;color:#633806;border:0.5px solid #EF9F27':c.tier==='Metro City'?'background:#E6F1FB;color:#0C447C;border:0.5px solid #85B7EB':'background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5';
  const tlinks=c.transport_links.map(t=>`<a class="pill dp-pill ${t.cls}" href="${t.url}" target="_blank" rel="noopener"><i class="ti ${t.icon}"></i>${t.label}<i class="ti ti-external-link pill-ext"></i></a>`).join('');
  const wlinks=c.web_links.map(t=>`<a class="pill dp-pill ${t.cls}" href="${t.url}" target="_blank" rel="noopener"><i class="ti ${t.icon}"></i>${t.label}<i class="ti ti-external-link pill-ext"></i></a>`).join('');
  const facts=c.key_facts.map(f=>`<div class="fp-fact-item"><div class="fp-fact-dot" style="background:${c.accentColor}"></div><span class="fp-fact-text">${f}</span></div>`).join('');

  return `<div class="fp-accent" style="background:${c.accentColor}"></div>
<div class="fp-body">
  <div class="fp-topbar">
    <button class="fp-back" onclick="closeDetail()"><i class="ti ti-arrow-left"></i> All cities</button>
    <button class="fp-close" onclick="closeDetail()" aria-label="Close"><i class="ti ti-x"></i></button>
  </div>
  <div class="fp-city-name">${c.name}</div>
  <div class="fp-founded"><i class="ti ti-history" style="font-size:12px"></i>${c.founded}</div>
  <div class="fp-badges">
    <span class="fp-badge" style="background:rgba(245,166,35,0.14);color:#7A4500;border:0.5px solid rgba(245,166,35,0.4)"><i class="ti ti-users"></i>${c.pop}M population</span>
    <span class="fp-badge" style="${tierStyle}">${c.tier}</span>
    <span class="fp-badge" style="background:#f0f0f0;color:#555;border:0.5px solid #ccc"><i class="ti ti-map-pin"></i>${c.region}</span>
  </div>

  <div class="fp-stats">
    <div class="fp-stat"><div class="fp-stat-val">${c.area.toLocaleString()} km²</div><div class="fp-stat-lbl">Urban area</div></div>
    <div class="fp-stat"><div class="fp-stat-val">${c.metro_km>0?c.metro_km+' km':'Planned'}</div><div class="fp-stat-lbl">Metro network</div></div>
    <div class="fp-stat"><div class="fp-stat-val">${c.metro_stations>0?c.metro_stations:'—'}</div><div class="fp-stat-lbl">Metro stations</div></div>
    <div class="fp-stat"><div class="fp-stat-val">${c.water}%</div><div class="fp-stat-lbl">Piped water</div></div>
    <div class="fp-stat"><div class="fp-stat-val">${c.sewerage}%</div><div class="fp-stat-lbl">Sewerage</div></div>
    <div class="fp-stat"><div class="fp-stat-val">${c.sewage_plants}</div><div class="fp-stat-lbl">Sewage plants</div></div>
  </div>

  <div class="fp-util-grid">
    <div class="fp-util"><div class="fp-util-label"><i class="ti ti-droplet"></i>Piped water access</div><div class="fp-util-track"><div class="fp-util-fill" style="width:${c.water}%;background:${c.accentColor}"></div></div><div class="fp-util-pct">${c.water}%</div><div class="fp-util-sub">of households</div></div>
    <div class="fp-util"><div class="fp-util-label"><i class="ti ti-ripple"></i>Sewerage coverage</div><div class="fp-util-track"><div class="fp-util-fill" style="width:${c.sewerage}%;background:#2ABFBF"></div></div><div class="fp-util-pct">${c.sewerage}%</div><div class="fp-util-sub">of households</div></div>
    <div class="fp-util"><div class="fp-util-label"><i class="ti ti-bolt"></i>Electricity access</div><div class="fp-util-track"><div class="fp-util-fill" style="width:${c.electricity}%;background:#F5A623"></div></div><div class="fp-util-pct">${c.electricity}%</div><div class="fp-util-sub">near-universal</div></div>
    <div class="fp-util"><div class="fp-util-label"><i class="ti ti-trending-up"></i>Economy</div><div style="font-size:13px;color:var(--text-primary);font-family:'Inter',sans-serif;line-height:1.55;margin-top:4px;font-weight:400">${c.economy}</div></div>
  </div>

  <div class="fp-info-grid">
    <div class="fp-info-card"><div class="fp-sec-label"><i class="ti ti-map-2"></i>Urban sprawl</div><div class="fp-info-text">${c.sprawl}</div></div>
    <div class="fp-info-card"><div class="fp-sec-label"><i class="ti ti-train"></i>Public transport</div><div class="fp-info-text">${c.transport}</div></div>
    <div class="fp-info-card"><div class="fp-sec-label"><i class="ti ti-calendar-event"></i>Upcoming plans</div><div class="fp-info-text">${c.transport_plans}</div></div>
    <div class="fp-info-card"><div class="fp-sec-label"><i class="ti ti-building"></i>Utilities detail</div><div class="fp-info-text">${c.utility}</div></div>
  </div>

  <div class="fp-facts">
    <div class="fp-sec-label"><i class="ti ti-star"></i>Key facts</div>
    ${facts}
  </div>

  <div class="fp-future">
    <div class="fp-sec-label"><i class="ti ti-telescope"></i>Future outlook</div>
    <div style="font-size:13px;color:var(--text-primary);line-height:1.65;font-family:'Inter',sans-serif;font-weight:400">${c.future}</div>
  </div>

  <div class="fp-divider"></div>

  <div class="fp-link-section">
    <div class="fp-sec-label"><i class="ti ti-train"></i>Transport authority portals</div>
    <div class="fp-link-row">${tlinks}</div>
  </div>

  <div class="fp-divider"></div>

  <div class="fp-link-section">
    <div class="fp-sec-label"><i class="ti ti-world"></i>Web sources</div>
    <div class="fp-link-row">${wlinks}</div>
  </div>
</div>`;
}

filterCards();
</script>
</body>
</html>
